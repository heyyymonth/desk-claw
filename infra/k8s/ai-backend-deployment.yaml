apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-backend
  namespace: desk-claw
  labels:
    app.kubernetes.io/name: desk-claw
    app.kubernetes.io/component: ai-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: desk-claw
      app.kubernetes.io/component: ai-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: desk-claw
        app.kubernetes.io/component: ai-backend
    spec:
      containers:
        - name: ai-backend
          image: ghcr.io/heyyymonth/desk-claw-ai-backend:REPLACE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: AI_BACKEND_PORT
              value: "9000"
            - name: DEFAULT_AI_PROVIDER
              value: ollama
            - name: FALLBACK_AI_PROVIDER
              value: openai
            - name: AI_REQUEST_TIMEOUT_SECONDS
              value: "120"
            - name: OLLAMA_DEFAULT_MODEL
              value: gemma4:31b-cloud
            - name: OPENAI_DEFAULT_MODEL
              value: gpt-5.5
            - name: ANTHROPIC_DEFAULT_MODEL
              value: claude-opus-4-7
            - name: ANTHROPIC_VERSION
              value: "2023-06-01"
            - name: GEMINI_API_VERSION
              value: v1beta
            - name: GEMINI_DEFAULT_MODEL
              value: gemini-3.1-flash-lite
            - name: GEMINI_OPENAI_COMPAT_BASE_URL
              value: https://generativelanguage.googleapis.com/v1beta/openai/
            - name: GEMINI_USE_OPENAI_COMPAT
              value: "false"
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-provider-secret
                  key: OLLAMA_API_KEY
                  optional: true
            - name: OLLAMA_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-provider-secret
                  key: OLLAMA_BASE_URL
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-provider-secret
                  key: OPENAI_API_KEY
                  optional: true
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-provider-secret
                  key: OPENAI_BASE_URL
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-provider-secret
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: ANTHROPIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-provider-secret
                  key: ANTHROPIC_BASE_URL
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-provider-secret
                  key: GEMINI_API_KEY
                  optional: true
            - name: GEMINI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-provider-secret
                  key: GEMINI_BASE_URL
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
