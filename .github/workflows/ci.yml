name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/desk-ai-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/desk-ai-frontend

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: executive-ops-copilot-v0/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run backend lint
        run: python -m ruff check app tests

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: executive-ops-copilot-v0/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run backend tests
        env:
          LLM_MODE: mock
          OLLAMA_MODEL: gemma4:latest
          WARM_OLLAMA_ON_STARTUP: "false"
        run: python -m pytest

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: executive-ops-copilot-v0/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: executive-ops-copilot-v0/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: executive-ops-copilot-v0/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: executive-ops-copilot-v0/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: executive-ops-copilot-v0/e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            executive-ops-copilot-v0/e2e/package-lock.json
            executive-ops-copilot-v0/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: executive-ops-copilot-v0/frontend
        run: npm ci

      - name: Install E2E dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: executive-ops-copilot-v0/e2e/playwright-report
          if-no-files-found: ignore

  kubernetes:
    name: Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install kubectl
        env:
          KUBECTL_VERSION: v1.36.1
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl --retry 3 --retry-delay 2 -fsSLo "$RUNNER_TEMP/bin/kubectl" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x "$RUNNER_TEMP/bin/kubectl"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: v0.7.0
        run: |
          curl --retry 3 --retry-delay 2 -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar -xz -C "$RUNNER_TEMP/bin" kubeconform
          chmod +x "$RUNNER_TEMP/bin/kubeconform"

      - name: Check validation clients
        run: |
          kubectl version --client=true
          kubeconform -v

      - name: Validate Kubernetes manifests
        run: ./executive-ops-copilot-v0/scripts/validate-k8s.sh

  backend-container-image:
    name: Backend container image
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-tests
      - frontend-lint
      - frontend
      - e2e
      - kubernetes
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=git-

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: executive-ops-copilot-v0/backend
          file: executive-ops-copilot-v0/backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  frontend-container-image:
    name: Frontend container image
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-tests
      - frontend-lint
      - frontend
      - e2e
      - kubernetes
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=git-

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: executive-ops-copilot-v0/frontend
          file: executive-ops-copilot-v0/frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          build-args: |
            VITE_API_BASE_URL=
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
