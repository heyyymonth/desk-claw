name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: executive-ops-copilot-v0

jobs:
  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: executive-ops-copilot-v0/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: executive-ops-copilot-v0/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  web-backend-check:
    name: Web Backend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: executive-ops-copilot-v0/web_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check app tests

      - name: Test
        env:
          AI_BACKEND_URL: http://127.0.0.1:9000
          WARM_MODEL_ON_STARTUP: "false"
        run: python -m pytest

      - name: Startup smoke
        env:
          AI_BACKEND_URL: http://127.0.0.1:9000
          WARM_MODEL_ON_STARTUP: "false"
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import create_app

          with TestClient(create_app()) as client:
              response = client.get("/health")
              response.raise_for_status()
              body = response.json()
              assert body["status"] == "ok"
              assert body["service"] == "web-backend"
          PY

  ai-backend-check:
    name: AI Backend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: executive-ops-copilot-v0/ai_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest ruff

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Startup smoke
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from main import create_app

          with TestClient(create_app()) as client:
              health = client.get("/health")
              health.raise_for_status()
              assert health.json()["service"] == "ai-backend"

              providers = client.get("/health/providers")
              providers.raise_for_status()
              body = providers.json()
              assert set(body["providers"]) == {"ollama", "openai", "anthropic", "gemini"}
          PY

  compose-config:
    name: Compose config
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: executive-ops-copilot-v0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Docker Compose
        run: docker compose config

  container-build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs:
      - frontend-check
      - web-backend-check
      - ai-backend-check
      - compose-config
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: executive-ops-copilot-v0/frontend
            dockerfile: executive-ops-copilot-v0/frontend/Dockerfile
            tag: app-frontend:ci
            cache-scope: frontend
            build-args: |
              VITE_API_BASE_URL=
          - service: web-backend
            context: executive-ops-copilot-v0/web_backend
            dockerfile: executive-ops-copilot-v0/web_backend/Dockerfile
            tag: app-web-backend:ci
            cache-scope: web-backend
            build-args: ""
          - service: ai-backend
            context: executive-ops-copilot-v0/ai_backend
            dockerfile: executive-ops-copilot-v0/ai_backend/Dockerfile
            tag: app-ai-backend:ci
            cache-scope: ai-backend
            build-args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.tag }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,scope=${{ matrix.cache-scope }},mode=max

  container-smoke:
    name: Container smoke
    runs-on: ubuntu-latest
    needs: container-build
    defaults:
      run:
        working-directory: executive-ops-copilot-v0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build compose images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Smoke test services
        run: |
          set -euo pipefail

          dump_logs() {
            docker compose ps
            docker compose logs --no-color
          }
          trap 'status=$?; if [ "$status" -ne 0 ]; then dump_logs; fi; docker compose down -v; exit "$status"' EXIT

          wait_for_http() {
            local url="$1"
            local label="$2"
            local timeout_seconds="${3:-120}"
            local started
            started="$(date +%s)"
            until curl -fsS "$url" >/dev/null; do
              if (( "$(date +%s)" - started >= timeout_seconds )); then
                echo "Timed out waiting for $label at $url" >&2
                return 1
              fi
              sleep 2
            done
          }

          wait_for_http http://127.0.0.1:9000/health "AI Backend"
          wait_for_http http://127.0.0.1:9000/health/providers "AI Backend provider health"
          wait_for_http http://127.0.0.1:8000/health "Web Backend"
          wait_for_http http://127.0.0.1:3000/ "Frontend"

          docker compose exec -T web-backend python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://ai-backend:9000/health", timeout=5) as response:
              body = json.loads(response.read().decode("utf-8"))
          assert body["status"] == "ok"
          assert body["service"] == "ai-backend"
          PY

  publish-images:
    name: Publish ${{ matrix.service }} image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - frontend-check
      - web-backend-check
      - ai-backend-check
      - compose-config
      - container-build
      - container-smoke
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: executive-ops-copilot-v0/frontend
            dockerfile: executive-ops-copilot-v0/frontend/Dockerfile
            image-suffix: frontend
            cache-scope: frontend
            build-args: |
              VITE_API_BASE_URL=
          - service: web-backend
            context: executive-ops-copilot-v0/web_backend
            dockerfile: executive-ops-copilot-v0/web_backend/Dockerfile
            image-suffix: web-backend
            cache-scope: web-backend
            build-args: ""
          - service: ai-backend
            context: executive-ops-copilot-v0/ai_backend
            dockerfile: executive-ops-copilot-v0/ai_backend/Dockerfile
            image-suffix: ai-backend
            cache-scope: ai-backend
            build-args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: ${{ matrix.build-args }}
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.image-suffix }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-${{ matrix.image-suffix }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,scope=${{ matrix.cache-scope }},mode=max
