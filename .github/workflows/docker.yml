name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: executive-ops-copilot-v0/backend
          file: executive-ops-copilot-v0/backend/Dockerfile
          push: false
          load: false
          tags: agentic-request-parser-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: executive-ops-copilot-v0/frontend
          file: executive-ops-copilot-v0/frontend/Dockerfile
          push: false
          load: false
          build-args: |
            VITE_API_BASE_URL=
          tags: agentic-request-parser-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
