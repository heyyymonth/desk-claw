apiVersion: v1
kind: Secret
metadata:
  name: desk-ai-secrets
  namespace: desk-ai
type: Opaque
stringData:
  ADMIN_API_KEY: replace-with-a-random-admin-key
  ACTOR_AUTH_TOKEN: replace-with-a-random-actor-token
  DATABASE_URL: postgresql://replace-user:replace-password@replace-host:5432/replace-db?sslmode=require
