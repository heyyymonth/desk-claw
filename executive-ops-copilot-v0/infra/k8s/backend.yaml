apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-data
  namespace: desk-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: desk-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/desk-ai-backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: desk-ai-config
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: backend-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: backend-data
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: desk-ai
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
