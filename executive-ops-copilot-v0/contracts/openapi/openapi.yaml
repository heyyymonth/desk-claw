openapi: 3.1.0
info:
  title: Executive Ops Scheduling Copilot API
  version: 0.1.0
  description: Local V0 API for parsing meeting requests, generating scheduling recommendations, drafting responses, and logging decisions.
servers:
  - url: http://localhost:8000
    description: Local FastAPI development server
tags:
  - name: Requests
  - name: Recommendations
  - name: Drafts
  - name: Rules
  - name: Calendar
  - name: Feedback
  - name: Decisions
  - name: Evals
paths:
  /api/requests/parse:
    post:
      tags: [Requests]
      operationId: parseMeetingRequest
      summary: Parse pasted meeting request text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingRequestRaw"
            examples:
              customerRisk:
                $ref: "#/components/examples/MeetingRequestRawExample"
      responses:
        "200":
          description: Parsed meeting request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedMeetingRequest"
              examples:
                customerRisk:
                  $ref: "#/components/examples/ParsedMeetingRequestExample"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/ModelFailure"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/recommendations/generate:
    post:
      tags: [Recommendations]
      operationId: generateRecommendation
      summary: Generate a scheduling recommendation for a parsed request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRecommendationRequest"
            examples:
              customerRisk:
                value:
                  request_id: req_01HXAMPLE001
                  rules_profile_id: rules_default
                  calendar_block_ids: [cal_01HXAMPLE001]
      responses:
        "200":
          description: Generated recommendation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
              examples:
                customerRisk:
                  $ref: "#/components/examples/RecommendationExample"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "502":
          $ref: "#/components/responses/ModelFailure"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/drafts/generate:
    post:
      tags: [Drafts]
      operationId: generateDraftResponse
      summary: Generate an editable draft response from a recommendation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDraftRequest"
            examples:
              accept:
                value:
                  request_id: req_01HXAMPLE001
                  recommendation_id: rec_01HXAMPLE001
                  draft_type: accept
                  tone: warm
      responses:
        "200":
          description: Generated draft response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"
              examples:
                accept:
                  $ref: "#/components/examples/DraftResponseExample"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/ModelFailure"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/rules:
    get:
      tags: [Rules]
      operationId: getRules
      summary: Get the active executive rules profile.
      responses:
        "200":
          description: Active rules profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveRulesProfile"
              examples:
                defaultRules:
                  $ref: "#/components/examples/ExecutiveRulesProfileExample"
    put:
      tags: [Rules]
      operationId: updateRules
      summary: Replace the active executive rules profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutiveRulesProfile"
            examples:
              defaultRules:
                $ref: "#/components/examples/ExecutiveRulesProfileExample"
      responses:
        "200":
          description: Updated rules profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveRulesProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/calendar/blocks:
    get:
      tags: [Calendar]
      operationId: listCalendarBlocks
      summary: List local calendar blocks.
      parameters:
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Calendar blocks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCalendarBlocksResponse"
              examples:
                focusBlock:
                  value:
                    blocks:
                      - block_id: cal_01HXAMPLE001
                        title: Executive focus block
                        start: "2026-05-12T13:00:00-07:00"
                        end: "2026-05-12T14:30:00-07:00"
                        timezone: America/Los_Angeles
                        block_type: focus
                        is_movable: false
                        notes: Protected focus time.
                    count: 1
    post:
      tags: [Calendar]
      operationId: createCalendarBlock
      summary: Create a local calendar block.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCalendarBlockRequest"
            examples:
              focusBlock:
                value:
                  title: Executive focus block
                  start: "2026-05-12T13:00:00-07:00"
                  end: "2026-05-12T14:30:00-07:00"
                  timezone: America/Los_Angeles
                  block_type: focus
                  is_movable: false
      responses:
        "201":
          description: Created calendar block.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarBlock"
              examples:
                focusBlock:
                  $ref: "#/components/examples/CalendarBlockExample"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/feedback:
    post:
      tags: [Feedback]
      operationId: submitDecisionFeedback
      summary: Log final user feedback for a recommendation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionFeedback"
            examples:
              accepted:
                $ref: "#/components/examples/DecisionFeedbackExample"
      responses:
        "201":
          description: Decision log entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionLogEntry"
              examples:
                logged:
                  $ref: "#/components/examples/DecisionLogEntryExample"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/decisions:
    get:
      tags: [Decisions]
      operationId: listDecisions
      summary: List logged scheduling decisions.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: request_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Decision log entries, newest first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDecisionsResponse"
              examples:
                oneDecision:
                  value:
                    decisions:
                      - decision_id: dec_01HXAMPLE001
                        request_id: req_01HXAMPLE001
                        recommendation_id: rec_01HXAMPLE001
                        draft_id: draft_01HXAMPLE001
                        request_title: Acme renewal risk discussion
                        requester_name: Jordan Lee
                        recommended_action: propose_times
                        final_action: propose_times
                        accepted_recommendation: true
                        draft_was_edited: true
                        final_response_text: "Hi Jordan,\n\nMaya can meet on Tuesday, May 12 from 3:00-3:30 PM PT to discuss renewal risks. Please send over any context you would like her to review in advance.\n\nBest,"
                        selected_slot:
                          start: "2026-05-12T15:00:00-07:00"
                          end: "2026-05-12T15:30:00-07:00"
                          timezone: America/Los_Angeles
                          reason: Matches requester window and preserves executive prep time.
                          calendar_conflicts: []
                        user_notes: Sent after minor wording edit.
                        created_at: "2026-05-08T09:05:00-07:00"
                        actor_id: local-user
                    count: 1
                    limit: 25
  /api/evals/run:
    post:
      tags: [Evals]
      operationId: runEvals
      summary: Run local V0 eval cases.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunEvalsRequest"
            examples:
              contractsOnly:
                value:
                  case_set: contracts
      responses:
        "200":
          description: Eval run result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunEvalsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    MeetingRequestRaw:
      $ref: ../schemas/meeting_request.schema.json#/$defs/MeetingRequestRaw
    ParsedMeetingRequest:
      $ref: ../schemas/meeting_request.schema.json#/$defs/ParsedMeetingRequest
    CalendarBlock:
      $ref: ../schemas/meeting_request.schema.json#/$defs/CalendarBlock
    ExecutiveRulesProfile:
      $ref: ../schemas/executive_rules.schema.json#/$defs/ExecutiveRulesProfile
    Recommendation:
      $ref: ../schemas/recommendation.schema.json#/$defs/Recommendation
    DraftResponse:
      $ref: ../schemas/draft_response.schema.json#/$defs/DraftResponse
    DecisionFeedback:
      $ref: ../schemas/recommendation.schema.json#/$defs/DecisionFeedback
    DecisionLogEntry:
      $ref: ../schemas/recommendation.schema.json#/$defs/DecisionLogEntry
    ErrorResponse:
      $ref: ../schemas/common.schema.json#/$defs/ErrorResponse
    ListCalendarBlocksResponse:
      type: object
      additionalProperties: false
      required: [blocks, count]
      properties:
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/CalendarBlock"
        count:
          type: integer
          minimum: 0
    ListDecisionsResponse:
      type: object
      additionalProperties: false
      required: [decisions, count, limit]
      properties:
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/DecisionLogEntry"
        count:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
    GenerateRecommendationRequest:
      type: object
      additionalProperties: false
      required: [request_id]
      properties:
        request_id:
          type: string
          pattern: "^req_[A-Za-z0-9_-]+$"
        rules_profile_id:
          type: string
          default: rules_default
        calendar_block_ids:
          type: array
          description: Optional subset of calendar blocks. If omitted, backend uses relevant local blocks.
          items:
            type: string
            pattern: "^cal_[A-Za-z0-9_-]+$"
    GenerateDraftRequest:
      type: object
      additionalProperties: false
      required: [request_id, recommendation_id, draft_type]
      properties:
        request_id:
          type: string
          pattern: "^req_[A-Za-z0-9_-]+$"
        recommendation_id:
          type: string
          pattern: "^rec_[A-Za-z0-9_-]+$"
        draft_type:
          type: string
          enum: [accept, decline, clarify, defer]
        tone:
          type: string
          enum: [concise, warm, firm]
          default: warm
    CreateCalendarBlockRequest:
      type: object
      additionalProperties: false
      required: [title, start, end, timezone, block_type]
      properties:
        title:
          type: string
          minLength: 1
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        timezone:
          type: string
          minLength: 1
        block_type:
          type: string
          enum: [busy, tentative, hold, travel, focus]
        is_movable:
          type: boolean
          default: false
        notes:
          type: string
    RunEvalsRequest:
      type: object
      additionalProperties: false
      properties:
        case_set:
          type: string
          enum: [contracts, parse, recommendation, all]
          default: all
    RunEvalsResponse:
      type: object
      additionalProperties: false
      required: [run_id, case_set, passed, failed, results, created_at]
      properties:
        run_id:
          type: string
          pattern: "^eval_[A-Za-z0-9_-]+$"
        case_set:
          type: string
          enum: [contracts, parse, recommendation, all]
        passed:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0
        results:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [case_id, status]
            properties:
              case_id:
                type: string
              status:
                type: string
                enum: [passed, failed, skipped]
              message:
                type: string
        created_at:
          type: string
          format: date-time
  responses:
    BadRequest:
      description: Request payload is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: validation_error
              message: raw_text is required.
              field: raw_text
    NotFound:
      description: Referenced resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: not_found
              message: No parsed request exists for req_missing.
              request_id: req_missing
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: conflict
              message: Feedback has already been logged for this recommendation.
    ModelFailure:
      description: Local model failed and no deterministic fallback was available.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: model_unavailable
              message: Local model runtime is unavailable.
    InternalError:
      description: Unexpected local backend or persistence failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: persistence_error
              message: Could not write decision log entry.
  examples:
    MeetingRequestRawExample:
      value:
        raw_text: "Could Maya meet with Jordan from Acme next Tuesday afternoon for 30 minutes about renewal risks?"
        source: paste
        received_at: "2026-05-08T08:58:00-07:00"
    ParsedMeetingRequestExample:
      value:
        request_id: req_01HXAMPLE001
        raw_text: "Could Maya meet with Jordan from Acme next Tuesday afternoon for 30 minutes about renewal risks?"
        title: Acme renewal risk discussion
        requester:
          name: Jordan Lee
          email: jordan.lee@acme.example
          organization: Acme
          role: requester
        meeting_type: customer
        urgency: high
        importance: high
        sensitivity: normal
        duration_minutes: 30
        duration_inferred: false
        attendees:
          - name: Maya Chen
            role: executive
          - name: Jordan Lee
            email: jordan.lee@acme.example
            organization: Acme
            role: requester
        preferred_windows:
          - start: "2026-05-12T13:00:00-07:00"
            end: "2026-05-12T17:00:00-07:00"
            timezone: America/Los_Angeles
            source_text: next Tuesday afternoon
        constraints:
          - Discuss renewal risk before Friday
        missing_fields: []
        agenda: Renewal risks
        parse_confidence: 0.86
        model_status: used
        created_at: "2026-05-08T09:00:00-07:00"
    ExecutiveRulesProfileExample:
      value:
        profile_id: rules_default
        executive_name: Maya Chen
        timezone: America/Los_Angeles
        working_hours:
          days: [monday, tuesday, wednesday, thursday, friday]
          start_time: "09:00"
          end_time: "17:00"
          timezone: America/Los_Angeles
        minimum_notice_hours: 24
        default_meeting_duration_minutes: 30
        meeting_type_priorities:
          intro: medium
          internal: medium
          customer: high
          investor: critical
          candidate: high
          vendor: low
          board: critical
          personal: medium
          other: medium
        preferred_meeting_days: [tuesday, wednesday, thursday]
        avoid_time_windows:
          - label: No meetings before prep time
            start_time: "09:00"
            end_time: "10:00"
            priority: high
        rules:
          - rule_id: rule_customer_risk
            description: Prioritize customer meetings about renewal or escalation risk.
            priority: hard
            applies_to_meeting_types: [customer]
        updated_at: "2026-05-08T09:00:00-07:00"
    CalendarBlockExample:
      value:
        block_id: cal_01HXAMPLE001
        title: Executive focus block
        start: "2026-05-12T13:00:00-07:00"
        end: "2026-05-12T14:30:00-07:00"
        timezone: America/Los_Angeles
        block_type: focus
        is_movable: false
        notes: Protected focus time.
    RecommendationExample:
      value:
        recommendation_id: rec_01HXAMPLE001
        request_id: req_01HXAMPLE001
        recommended_action: propose_times
        confidence: 0.82
        risk_level: medium
        human_review_required: false
        risks:
          - risk_level: medium
            message: Only one preferred afternoon slot is conflict-free.
            related_rule_ids: [rule_customer_risk]
        rationale:
          - Customer renewal risk is high priority.
          - The proposed slot avoids focus time and existing busy blocks.
        proposed_slots:
          - start: "2026-05-12T15:00:00-07:00"
            end: "2026-05-12T15:30:00-07:00"
            timezone: America/Los_Angeles
            reason: Matches requester window and preserves executive prep time.
            calendar_conflicts: []
        applied_rule_ids: [rule_customer_risk]
        calendar_block_ids_considered: [cal_01HXAMPLE001]
        model_status: used
        created_at: "2026-05-08T09:01:00-07:00"
    DraftResponseExample:
      value:
        draft_id: draft_01HXAMPLE001
        request_id: req_01HXAMPLE001
        recommendation_id: rec_01HXAMPLE001
        draft_type: accept
