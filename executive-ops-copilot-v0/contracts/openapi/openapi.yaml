        body: "Hi Jordan,\n\nMaya can meet on Tuesday, May 12 from 3:00-3:30 PM PT to discuss renewal risks. Please send over any context you would like her to review in advance.\n\nBest,"
        tone: warm
        editable: true
        model_status: used
        created_at: "2026-05-08T09:02:00-07:00"
    DecisionFeedbackExample:
      value:
        request_id: req_01HXAMPLE001
        recommendation_id: rec_01HXAMPLE001
        draft_id: draft_01HXAMPLE001
        final_action: propose_times
        accepted_recommendation: true
        draft_was_edited: true
        final_response_text: "Hi Jordan,\n\nMaya can meet on Tuesday, May 12 from 3:00-3:30 PM PT to discuss renewal risks. Please send over any context you would like her to review in advance.\n\nBest,"
        selected_slot:
          start: "2026-05-12T15:00:00-07:00"
          end: "2026-05-12T15:30:00-07:00"
          timezone: America/Los_Angeles
          reason: Matches requester window and preserves executive prep time.
          calendar_conflicts: []
        user_notes: Sent after minor wording edit.
        actor_id: local-user
    DecisionLogEntryExample:
      value:
        decision_id: dec_01HXAMPLE001
        request_id: req_01HXAMPLE001
        recommendation_id: rec_01HXAMPLE001
        draft_id: draft_01HXAMPLE001
        request_title: Acme renewal risk discussion
        requester_name: Jordan Lee
        recommended_action: propose_times
        final_action: propose_times
        accepted_recommendation: true
        draft_was_edited: true
        final_response_text: "Hi Jordan,\n\nMaya can meet on Tuesday, May 12 from 3:00-3:30 PM PT to discuss renewal risks. Please send over any context you would like her to review in advance.\n\nBest,"
        selected_slot:
          start: "2026-05-12T15:00:00-07:00"
          end: "2026-05-12T15:30:00-07:00"
          timezone: America/Los_Angeles
          reason: Matches requester window and preserves executive prep time.
          calendar_conflicts: []
