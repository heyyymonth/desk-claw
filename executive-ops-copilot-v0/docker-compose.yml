services:
  backend:
    build:
      context: ./backend
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-5.5}
      AI_API_ENDPOINT: ${AI_API_ENDPOINT:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      WARM_MODEL_ON_STARTUP: "false"
      MODEL_WARMUP_TIMEOUT_SECONDS: "30"
      AI_AGENT_TIMEOUT_SECONDS: "180"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 24

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
